spring:
  application:
    name: homefit-ingestion
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/homefit}
    username: ${DATABASE_USER:homefit}
    password: ${DATABASE_PASSWORD:homefit}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: false   # api 서비스가 마이그레이션 담당

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

homefit:
  publicdata:
    base-url: https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/
    api-key: ${PUBLIC_DATA_API_KEY:}
    page-size: 500
    lookback-days: 90
  ingestion:
    admin-token: ${INGESTION_ADMIN_TOKEN:dev-admin-token-change-me}

logging:
  level:
    root: INFO
    app.homefit.ingestion: DEBUG
