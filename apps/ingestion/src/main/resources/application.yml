spring:
  application:
    name: homefit-ingestion
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/homefit}
    username: ${DATABASE_USER:homefit}
    password: ${DATABASE_PASSWORD:homefit}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: false   # api 서비스가 마이그레이션 담당
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # Spring Boot K8s probes — liveness 는 외부 의존성(Redis/DB) 무관 즉시 UP.
      # Railway healthcheckPath 가 /actuator/health/liveness 로 바뀜.
      probes:
        enabled: true
      show-details: never
  health:
    redis:
      # Redis 가 일시적으로 unavailable 해도 /actuator/health 가 DOWN 안 되도록 비필수.
      enabled: false

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:${SPRING_PROFILES_ACTIVE:default}}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  traces-sample-rate: 0.02
  logging:
    minimum-event-level: warn
    minimum-breadcrumb-level: info

homefit:
  publicdata:
    base-url: https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/
    api-key: ${PUBLIC_DATA_API_KEY:}
    page-size: 500
    lookback-days: 90
  ingestion:
    admin-token: ${INGESTION_ADMIN_TOKEN:dev-admin-token-change-me}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
  vworld:
    api-key: ${VWORLD_API_KEY:}
  lh:
    api-key: ${LH_API_KEY:}
    lookback-days: 365      # LH는 활성 공고 수가 상대적으로 적어 1년 윈도우
    page-size: 100
  notification:
    email:
      # SMTP 설정(spring.mail.*) + 발신 도메인이 모두 갖춰지면 true 로
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from: ${EMAIL_FROM:}
      web-base-url: ${WEB_BASE_URL:https://homefit.app}

logging:
  level:
    root: INFO
    app.homefit.ingestion: DEBUG
