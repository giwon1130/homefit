spring:
  application:
    name: homefit-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/homefit}
    username: ${DATABASE_USER:homefit}
    password: ${DATABASE_PASSWORD:homefit}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

homefit:
  auth:
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-in-prod-at-least-32-bytes}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30

logging:
  level:
    root: INFO
    app.homefit: DEBUG
