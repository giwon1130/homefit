spring:
  application:
    name: homefit-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/homefit}
    username: ${DATABASE_USER:homefit}
    password: ${DATABASE_PASSWORD:homefit}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

homefit:
  admin:
    # 관리자 큐레이션 엔드포인트(/api/v1/admin/*) 보호용. ingestion 토큰 재사용 가능.
    token: ${ADMIN_TOKEN:${INGESTION_ADMIN_TOKEN:dev-admin-token-change-me}}
  auth:
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-in-prod-at-least-32-bytes}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  crypto:
    # base64-encoded 32 bytes. Railway AES_ENCRYPTION_KEY env var.
    aes-key-base64: ${AES_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  odsay:
    api-key: ${ODSAY_API_KEY:}
    # ODsay 키에 등록된 URI 중 하나. Referer 검증용.
    referer: ${ODSAY_REFERER:https://homefit.app/}
  eligibility:
    # 도시근로자 월평균소득 (원, 2025 추정치 기준 — 매년 국토부 고시 변경 시 업데이트)
    urban-worker-monthly-income:
      1: 3600000
      2: 5400000
      3: 7200000
      4: 8200000
      5: 8800000
      6: 9400000
    rules:
      private-sale:
        newlywed: { marriage-years-max: 7, income-pct-limit: 140 }
        first-time: { income-pct-limit: 130, require-no-home: true }
        multi-child: { min-children: 2 }
        general: true
      public-sale:
        newlywed: { marriage-years-max: 7, income-pct-limit: 130 }
        first-time: { income-pct-limit: 130, require-no-home: true }
        multi-child: { min-children: 2 }
        general: true
      newlywed-hope:
        newlywed: { marriage-years-max: 7, income-pct-limit: 130 }
        general: false
      happy-house:
        newlywed: { marriage-years-max: 7, income-pct-limit: 100 }
        general: true
  loan:
    # 보금자리론, 디딤돌, LTV 한도 (2025 추정 — 매년 갱신 필요)
    bogeumjari:
      income-limit-default: 70000000
      income-limit-multi-child: 100000000
      price-limit: 900000000
      max-loan-default: 420000000
      max-loan-first-time: 450000000
    newlywed-didimdol:
      marriage-years-max: 7
      income-limit: 85000000
      price-limit: 600000000
      max-loan: 400000000
    region-ltv:
      "[서울특별시]": 50
      "[경기도]": 60
    default-ltv-pct: 70

logging:
  level:
    root: INFO
    app.homefit: DEBUG
